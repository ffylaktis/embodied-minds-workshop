<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workshop Notes — Embodied Minds Summit</title>
  <meta name="description" content="Capture breakout group notes for each workshop session at the Embodied Minds Summit, May 3, 2026.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500;8..60,600&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --cosmic: #0B0D1A;
      --card: #10121F;
      --elevated: #151728;
      --lunar: #E8EAF2;
      --lunar-90: rgba(232,234,242,0.90);
      --lunar-60: rgba(232,234,242,0.60);
      --lunar-40: rgba(232,234,242,0.40);
      --lunar-12: rgba(232,234,242,0.12);
      --lunar-07: rgba(232,234,242,0.07);
      --gold: #D4A94E;
      --gold-deep: #C49A42;
      --gold-dark: #A07830;
      --gold-40: rgba(212,169,78,0.40);
      --gold-15: rgba(212,169,78,0.15);
      --gold-08: rgba(212,169,78,0.08);
      --lavender: #9B8EC4;
      --lavender-20: rgba(155,142,196,0.20);
      --lavender-08: rgba(155,142,196,0.08);
      --muted: rgba(232,234,242,0.45);
      --green: #2a6a3a;
      --font-serif: 'Source Serif 4', Georgia, serif;
      --font-sans: 'Sora', 'Helvetica Neue', sans-serif;
      --max-w: 1100px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

    body {
      background: var(--cosmic);
      color: var(--lunar);
      font-family: var(--font-sans);
      font-weight: 400;
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 50% 40% at 80% 15%, rgba(155,142,196,0.04) 0%, transparent 70%),
        radial-gradient(ellipse 40% 50% at 10% 50%, rgba(212,169,78,0.03) 0%, transparent 65%),
        radial-gradient(ellipse 60% 35% at 60% 85%, rgba(155,142,196,0.035) 0%, transparent 70%);
    }

    a { color: inherit; text-decoration: none; }
    img, svg { display: block; max-width: 100%; }

    /* ─── STICKY HEADER ─── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(11,13,26,0.92);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--lunar-07);
      height: 64px;
    }
    .header-inner {
      max-width: var(--max-w); margin: 0 auto;
      padding: 0 clamp(24px, 5vw, 64px);
      height: 100%; display: flex; align-items: center; justify-content: space-between;
    }
    .site-title-group { display: flex; align-items: center; gap: 12px; text-decoration: none; cursor: pointer; }
    .site-logo { height: 38px; width: auto; }
    .site-title { font-family: var(--font-sans); font-size: 24px; font-weight: 500; color: var(--lunar); letter-spacing: -0.3px; }
    .header-admin { font-size: 13px; color: var(--lunar-40); cursor: pointer; transition: color 0.3s; background: none; border: none; font-family: var(--font-sans); }
    .header-admin:hover { color: var(--gold); }

    /* ─── MAIN WRAP ─── */
    .wrap {
      position: relative; z-index: 1;
      max-width: var(--max-w); margin: 0 auto;
      padding: clamp(48px, 6vw, 80px) clamp(24px, 5vw, 64px) 80px;
    }

    /* ─── PAGE HEADER ─── */
    .page-header { text-align: center; margin-bottom: clamp(40px, 6vw, 64px); }
    .page-header .lbl {
      font-size: 10px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase;
      color: var(--lavender); margin-bottom: 16px;
    }
    .page-header h1 {
      font-family: var(--font-serif); font-size: clamp(28px, 4vw, 42px); font-weight: 500;
      color: var(--gold); margin-bottom: 14px; line-height: 1.2;
    }
    .page-header p { color: var(--lunar-60); font-size: 15px; max-width: 600px; margin: 0 auto; line-height: 1.8; }
    .page-header .date-badge {
      display: inline-block; font-size: 11px; font-weight: 500; letter-spacing: 2px;
      text-transform: uppercase; color: var(--lunar-40); margin-top: 16px;
    }

    /* ─── WORKSHOP TILES ─── */
    .workshop-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    @media (max-width: 720px) { .workshop-grid { grid-template-columns: 1fr; } }

    .tile {
      position: relative; background: var(--card); border: 1px solid var(--lunar-07);
      border-radius: 14px; padding: 36px 32px; cursor: pointer;
      transition: border-color 0.4s cubic-bezier(0.22,1,0.36,1), background 0.4s cubic-bezier(0.22,1,0.36,1),
                  box-shadow 0.4s cubic-bezier(0.22,1,0.36,1), transform 0.4s cubic-bezier(0.22,1,0.36,1);
      display: flex; flex-direction: column; min-height: 220px; overflow: hidden;
    }
    .tile { --mx: 80%; --my: 20%; }
    .tile::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle 280px at var(--mx) var(--my), rgba(155,142,196,0.14) 0%, rgba(155,142,196,0.05) 35%, transparent 70%);
      opacity: 0; transition: opacity 0.4s cubic-bezier(0.22,1,0.36,1); pointer-events: none;
    }
    .tile:hover { border-color: var(--lavender-20); background: var(--elevated); box-shadow: 0 12px 40px rgba(0,0,0,0.35); transform: translateY(-2px); }
    .tile:hover::before { opacity: 1; }

    .tile-label { font-size: 10px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--lavender); margin-bottom: 10px; }
    .tile h3 { font-family: var(--font-serif); font-size: 20px; font-weight: 500; color: var(--lunar-90); margin-bottom: 10px; line-height: 1.35; }
    .tile p { color: var(--lunar-40); font-size: 13.5px; line-height: 1.7; flex-grow: 1; margin-bottom: 22px; }
    .tile-cta {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); transition: gap 0.3s;
    }
    .tile:hover .tile-cta { gap: 12px; }
    .tile-cta svg { width: 14px; height: 14px; transition: transform 0.3s; }
    .tile:hover .tile-cta svg { transform: translateX(2px); }

    /* ─── QUESTION CARDS ─── */
    .question-grid { display: flex; flex-direction: column; gap: 14px; }
    .q-card {
      background: var(--card); border: 1px solid var(--lunar-07); border-radius: 14px;
      padding: 28px 32px; cursor: pointer;
      transition: border-color 0.3s, background 0.3s, transform 0.3s;
    }
    .q-card:hover { border-color: var(--lavender-20); background: var(--elevated); transform: translateY(-1px); }
    .q-card-label { font-size: 10px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--lavender); margin-bottom: 8px; }
    .q-card-text { font-family: var(--font-serif); font-size: 17px; font-weight: 400; color: var(--lunar-90); line-height: 1.55; }

    /* ─── TEAM ENTRY ─── */
    .team-section { max-width: 640px; margin: 0 auto; }
    .team-question-text { font-family: var(--font-serif); font-size: clamp(18px,3vw,24px); font-weight: 500; color: var(--gold); line-height: 1.4; margin-bottom: 28px; text-align: center; }
    .existing-teams { margin-bottom: 24px; text-align: center; }
    .existing-teams-label { font-size: 12px; color: var(--lunar-40); margin-bottom: 10px; }
    .team-chip {
      display: inline-block; background: var(--card); border: 1px solid var(--lunar-07); border-radius: 8px;
      padding: 8px 18px; font-size: 13px; color: var(--lunar-60); cursor: pointer; margin: 0 6px 8px 0;
      transition: all 0.2s;
    }
    .team-chip:hover { border-color: var(--gold-40); color: var(--lunar); background: var(--gold-08); }

    .btn-create {
      display: block; width: 100%; max-width: 360px; margin: 0 auto;
      background: linear-gradient(170deg, #D4B67E 0%, #C4A265 60%, #B89555 100%);
      border: 1px solid rgba(212,182,126,0.35); color: var(--cosmic); font-family: var(--font-sans);
      font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; padding: 16px 32px;
      cursor: pointer; transition: all 0.3s; border-radius: 10px; font-weight: 500;
      box-shadow: 0 3px 12px rgba(196,162,101,0.25), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .btn-create:hover { background: linear-gradient(170deg, #E0C48E 0%, #D4B67E 60%, #C4A265 100%); transform: translateY(-1px); }

    /* ─── NOTES EDITOR ─── */
    .notes-wrap { max-width: 800px; margin: 0 auto; }
    .notes-meta { text-align: center; margin-bottom: 28px; }
    .notes-team { font-size: 10px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--lavender); margin-bottom: 10px; }
    .notes-question { font-family: var(--font-serif); font-size: clamp(18px,2.5vw,22px); font-weight: 400; color: var(--lunar-90); line-height: 1.5; margin-bottom: 6px; }
    .notes-workshop { font-size: 12px; color: var(--lunar-40); }
    .notes-area {
      width: 100%; min-height: 55vh; background: var(--card); border: 1px solid var(--lunar-07);
      border-radius: 14px; color: var(--lunar); font-family: var(--font-sans); font-size: 15px;
      font-weight: 400; padding: 24px; line-height: 1.8; outline: none; resize: vertical;
      transition: border-color 0.3s;
    }
    .notes-area:focus { border-color: var(--lavender-20); }
    .notes-area::placeholder { color: var(--lunar-40); }
    .save-indicator { font-size: 12px; color: var(--lunar-40); margin-top: 10px; text-align: right; transition: color 0.3s; }
    .save-indicator.saved { color: var(--green); }
    .save-indicator.saving { color: var(--gold); }
    .save-indicator.error { color: #c44; }

    /* ─── BACK LINK ─── */
    .back-link { font-size: 13px; color: var(--lunar-40); transition: color 0.3s; cursor: pointer; background: none; border: none; font-family: var(--font-sans); }
    .back-link:hover { color: var(--gold); }

    /* ─── PIN OVERLAY ─── */
    .pin-overlay {
      position: fixed; inset: 0; background: var(--cosmic); display: flex; align-items: center;
      justify-content: center; flex-direction: column; z-index: 200;
    }
    .pin-label { font-size: 10px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: var(--lavender); margin-bottom: 24px; }
    .pin-input {
      width: 200px; text-align: center; background: var(--card); border: 1px solid var(--lunar-07);
      border-radius: 10px; color: var(--lunar); font-family: var(--font-sans); font-size: 24px;
      font-weight: 300; padding: 14px; letter-spacing: 8px; outline: none;
    }
    .pin-input:focus { border-color: var(--lavender-20); }
    .pin-error { color: #c44; font-size: 13px; margin-top: 12px; }

    /* ─── DASHBOARD ─── */
    .dash-stats { display: flex; gap: 32px; justify-content: center; margin-bottom: 28px; }
    .dash-stat-num { font-family: var(--font-serif); font-size: 32px; font-weight: 500; color: var(--gold); text-align: center; }
    .dash-stat-label { font-size: 10px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--lunar-40); text-align: center; }
    .dash-dl-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 40px; }
    .btn-download {
      background: transparent; border: 1px solid var(--gold-40); color: var(--gold);
      font-family: var(--font-sans); font-size: 12px; font-weight: 500; letter-spacing: 1px;
      padding: 10px 22px; cursor: pointer; transition: all 0.2s; border-radius: 8px;
    }
    .btn-download:hover { background: var(--gold-08); border-color: var(--gold); }
    .dash-section { margin-bottom: 36px; }
    .dash-workshop-title { font-family: var(--font-serif); font-size: 22px; font-weight: 500; color: var(--gold); margin-bottom: 14px; }
    .dash-question { background: var(--card); border: 1px solid var(--lunar-07); border-radius: 10px; padding: 18px 22px; margin-bottom: 10px; }
    .dash-question-text { font-size: 14px; color: var(--lunar-60); margin-bottom: 10px; line-height: 1.6; }
    .dash-team { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--lunar-07); cursor: pointer; transition: background 0.2s; }
    .dash-team:last-child { border-bottom: none; }
    .dash-team:hover { background: var(--elevated); margin: 0 -8px; padding-left: 8px; padding-right: 8px; border-radius: 6px; }
    .dash-team-name { font-size: 14px; color: var(--lunar); font-weight: 500; }
    .dash-team-preview { font-size: 12px; color: var(--lunar-40); max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dash-team-time { font-size: 11px; color: var(--lunar-40); }

    /* ─── FOOTER ─── */
    .ft {
      position: relative; z-index: 1; max-width: var(--max-w); margin: 0 auto;
      padding: 36px clamp(24px, 5vw, 64px) 56px;
      border-top: 1px solid var(--lunar-07);
      display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 16px;
      font-size: 11px; color: var(--lunar-40); letter-spacing: 0.5px;
    }

    /* ─── REVEAL ─── */
    .r { opacity: 0; transform: translateY(24px); transition: opacity 0.9s cubic-bezier(0.22,1,0.36,1), transform 0.9s cubic-bezier(0.22,1,0.36,1); }
    .r.v { opacity: 1; transform: none; }
    .r-d1 { transition-delay: 0.08s; }
    .r-d2 { transition-delay: 0.16s; }
    .r-d3 { transition-delay: 0.24s; }
    .r-d4 { transition-delay: 0.32s; }

    /* ─── SYNTHESIS ─── */
    .synth-section { margin-bottom: 48px; }
    .synth-tabs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; }
    .synth-tab {
      background: var(--card); border: 1px solid var(--lunar-07); border-radius: 8px;
      padding: 10px 20px; font-family: var(--font-sans); font-size: 13px; font-weight: 500;
      color: var(--lunar-60); cursor: pointer; transition: all 0.3s; letter-spacing: 0.5px;
    }
    .synth-tab:hover { border-color: var(--lavender-20); color: var(--lunar); background: var(--elevated); }
    .synth-tab.active { border-color: var(--gold-40); color: var(--gold); background: var(--gold-08); }

    .synth-loading { text-align: center; padding: 48px 0; }
    .synth-loading-spinner {
      width: 32px; height: 32px; border: 3px solid var(--lunar-07); border-top-color: var(--gold);
      border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .synth-loading-text { font-size: 13px; color: var(--lunar-40); }

    .synth-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    @media (max-width: 720px) { .synth-panel { grid-template-columns: 1fr; } }

    .synth-card {
      background: var(--card); border: 1px solid var(--lunar-07); border-radius: 14px;
      padding: 24px 28px;
    }
    .synth-card-title {
      font-family: var(--font-serif); font-size: 18px; font-weight: 500; color: var(--gold);
      margin-bottom: 14px;
    }
    .synth-card ul { list-style: none; padding: 0; }
    .synth-card ul li {
      position: relative; padding: 6px 0 6px 18px; font-size: 14px; color: var(--lunar-60); line-height: 1.6;
    }
    .synth-card ul li::before {
      content: ''; position: absolute; left: 0; top: 14px;
      width: 6px; height: 6px; border-radius: 50%; background: var(--lavender);
    }

    .synth-themes { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .synth-theme-card {
      background: var(--card); border: 1px solid var(--lunar-07); border-radius: 12px;
      padding: 20px 24px; transition: border-color 0.3s, background 0.3s;
    }
    .synth-theme-card:hover { border-color: var(--lavender-20); background: var(--elevated); }
    .synth-theme-name {
      font-family: var(--font-serif); font-size: 16px; font-weight: 500; color: var(--lunar-90);
      margin-bottom: 6px;
    }
    .synth-theme-desc { font-size: 13px; color: var(--lunar-40); line-height: 1.6; margin-bottom: 8px; }
    .synth-theme-count {
      font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
      color: var(--lavender);
    }

    .synth-wordcloud-wrap {
      background: var(--card); border: 1px solid var(--lunar-07); border-radius: 14px;
      padding: 24px; margin-bottom: 24px; position: relative; overflow: hidden;
      min-height: 380px;
    }
    .synth-wordcloud-wrap svg { display: block; margin: 0 auto; }
    .synth-wordcloud-wrap svg text { transition: font-size 0.6s ease, fill 0.4s ease; cursor: default; }

    .synth-timeline {
      background: var(--card); border: 1px solid var(--lunar-07); border-radius: 10px;
      padding: 16px 24px; display: flex; align-items: center; gap: 14px; margin-bottom: 24px;
    }
    .synth-timeline input[type="range"] {
      flex: 1; -webkit-appearance: none; appearance: none; height: 4px;
      background: var(--lunar-07); border-radius: 2px; outline: none;
    }
    .synth-timeline input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: var(--gold); cursor: pointer; border: 2px solid var(--cosmic);
    }
    .synth-timeline input[type="range"]::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--gold); cursor: pointer; border: 2px solid var(--cosmic);
    }
    .synth-timeline-ts { font-size: 11px; color: var(--lunar-40); min-width: 140px; text-align: center; }
    .synth-btn {
      background: transparent; border: 1px solid var(--gold-40); color: var(--gold);
      font-family: var(--font-sans); font-size: 11px; font-weight: 500; letter-spacing: 1px;
      padding: 6px 14px; cursor: pointer; transition: all 0.2s; border-radius: 6px;
      white-space: nowrap;
    }
    .synth-btn:hover { background: var(--gold-08); border-color: var(--gold); }
    .synth-btn.active { background: var(--gold-15); border-color: var(--gold); }

    .synth-controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }

    @media (max-width: 720px) {
      .header-inner { flex-direction: column; gap: 6px; align-items: flex-start; height: auto; padding-top: 12px; padding-bottom: 12px; }
      .site-header { height: auto; }
      .notes-area { min-height: 45vh; padding: 16px; }
      .synth-timeline { flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>
<body>

  <!-- STICKY HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="site-title-group" data-action="go-home">
        <img src="assets/logo.png" alt="" class="site-logo">
        <span class="site-title">Embodied Minds Summit</span>
      </div>
      <button class="header-admin" id="admin-btn">Organizer</button>
    </div>
  </header>

  <main class="wrap" id="app">
    <!-- Dynamic content rendered here -->
  </main>

  <footer class="ft">
    <div>&copy; 2026 Embodied Minds Summit</div>
    <div>UCLA Luskin Conference Center</div>
  </footer>

  <!-- Supabase JS client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- JSZip for export -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
  <!-- DOMPurify for XSS protection -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <!-- SheetJS for Excel export -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <!-- docx.js for Word export -->
  <script src="https://cdn.jsdelivr.net/npm/docx@8/build/index.umd.min.js"></script>
  <!-- D3 + d3-cloud for word cloud -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-cloud@1/build/d3.layout.cloud.min.js"></script>

  <script>
// ================================================================
//  CONFIG
// ================================================================
var SB_URL = 'https://yaqduwagdixcaifbsshk.supabase.co';
var SB_KEY = 'sb_publishable_gZS4HBAWTj1r6jk48XYKEw_SqIY3lhw';
var sb = supabase.createClient(SB_URL, SB_KEY);

function esc(str) {
  return DOMPurify.sanitize(str, { ALLOWED_TAGS: [], ALLOWED_ATTR: [] });
}

// ================================================================
//  STATE
// ================================================================
var ST = {
  screen: 'home',
  workshops: [], questions: [],
  selectedWorkshop: null, selectedQuestion: null,
  teamName: '', teamId: null, notes: '',
  existingTeams: [],
  saveStatus: 'saved', saveTimer: null, localStorageKey: null,
  realtimeSub: null, allTeams: [],
  // Synthesis state
  synthWorkshopId: null, synthLoading: false,
  synthData: null, synthWordFreqs: null,
  synthSnapshots: [], synthSnapshotIdx: -1,
  synthAutoPlay: false, synthAutoPlayTimer: null,
  synthAutoRefresh: false, synthAutoRefreshTimer: null
};

// ================================================================
//  DATA
// ================================================================
async function loadWorkshops() {
  var res = await sb.from('workshops').select('*').order('sort_order');
  if (res.data) ST.workshops = res.data;
}

async function loadQuestions(workshopId) {
  var res = await sb.from('questions').select('*').eq('workshop_id', workshopId).order('sort_order');
  if (res.data) ST.questions = res.data;
}

async function loadExistingTeams(questionId) {
  var res = await sb.from('teams').select('id, team_name, updated_at').eq('question_id', questionId).order('created_at');
  if (res.data) ST.existingTeams = res.data;
}

async function loadOrCreateTeam(questionId, teamName) {
  var res = await sb.from('teams').select('*').eq('question_id', questionId).eq('team_name', teamName).limit(1);
  if (res.data && res.data.length > 0) return res.data[0];
  var ins = await sb.from('teams').insert({ question_id: questionId, team_name: teamName }).select().single();
  if (ins.error) { console.error('Failed to create team:', ins.error); return null; }
  return ins.data;
}

// ================================================================
//  REVEAL & GLOW
// ================================================================
function initReveal() {
  var io = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('v'); io.unobserve(e.target); } });
  }, { threshold: 0.15 });
  document.querySelectorAll('.r').forEach(function(el) { io.observe(el); });
}

function initTileGlow() {
  document.querySelectorAll('.tile').forEach(function(tile) {
    tile.addEventListener('pointermove', function(e) {
      var rect = tile.getBoundingClientRect();
      tile.style.setProperty('--mx', ((e.clientX - rect.left) / rect.width * 100) + '%');
      tile.style.setProperty('--my', ((e.clientY - rect.top) / rect.height * 100) + '%');
    });
  });
}

// ================================================================
function attachListeners() {
  document.querySelectorAll('[data-action="select-workshop"]').forEach(function(el) {
    el.addEventListener('click', async function() {
      ST.selectedWorkshop = el.dataset.id;
      await loadQuestions(ST.selectedWorkshop);
      ST.screen = 'questions';
      render();
    });
  });

  document.querySelectorAll('[data-action="select-question"]').forEach(function(el) {
    el.addEventListener('click', async function() {
      ST.selectedQuestion = el.dataset.id;
      await loadExistingTeams(ST.selectedQuestion);
      ST.screen = 'team-entry';
      render();
    });
  });

  document.querySelectorAll('[data-action="join-team"]').forEach(function(el) {
    el.addEventListener('click', async function() {
      ST.teamId = el.dataset.id;
      ST.teamName = el.dataset.name;
      await enterNotes();
    });
  });

  var createBtn = document.getElementById('create-team-btn');
  if (createBtn) {
    createBtn.addEventListener('click', async function() {
      var name = 'Team ' + (ST.existingTeams.length + 1);
      var team = await loadOrCreateTeam(ST.selectedQuestion, name);
      if (!team) return;
      ST.teamId = team.id;
      ST.teamName = team.team_name;
      ST.notes = team.notes || '';
      ST.screen = 'notes';
      ST.localStorageKey = 'em-notes-' + ST.teamId;
      render();
    });
  }

  var textarea = document.getElementById('notes-textarea');
  if (textarea) {
    textarea.addEventListener('input', function() {
      ST.notes = textarea.value;
      localStorage.setItem(ST.localStorageKey, ST.notes);
      debounceSave();
    });
    textarea.focus();
  }

  var pinInput = document.getElementById('pin-input');
  if (pinInput) {
    pinInput.focus();
    pinInput.addEventListener('input', async function() {
      if (pinInput.value === '2026') {
        removePin();
        await loadDashboardData();
        ST.screen = 'dashboard';
        render();
      } else if (pinInput.value.length >= 4) {
        document.getElementById('pin-error').style.display = 'block';
        pinInput.value = '';
      }
    });
  }

  var dlBtn = document.getElementById('download-btn');
  if (dlBtn) dlBtn.addEventListener('click', downloadZip);
  var dlExcel = document.getElementById('download-excel-btn');
  if (dlExcel) dlExcel.addEventListener('click', downloadExcel);
  var dlWord = document.getElementById('download-word-btn');
  if (dlWord) dlWord.addEventListener('click', downloadWord);

  document.querySelectorAll('[data-action="go-home"]').forEach(function(el) {
    el.addEventListener('click', function() { cleanupNotes(); removePin(); clearSynthTimers(); ST.screen = 'home'; render(); });
  });
  document.querySelectorAll('[data-action="go-questions"]').forEach(function(el) {
    el.addEventListener('click', function() { ST.screen = 'questions'; render(); });
  });

  document.querySelectorAll('[data-action="view-team-notes"]').forEach(function(el) {
    el.addEventListener('click', function() {
      var team = ST.allTeams.find(function(t) { return t.id === el.dataset.id; });
      if (team) alert(team.team_name + '\n\n' + (team.notes || '(empty)'));
    });
  });

  // Synthesis listeners
  attachSynthListeners();
  // Re-render word cloud if data exists (after DOM is ready)
  if (ST.screen === 'dashboard' && ST.synthWordFreqs && ST.synthWordFreqs.length > 0 && !ST.synthLoading) {
    setTimeout(function() { renderWordCloud(ST.synthWordFreqs); }, 50);
  }
}

async function enterNotes() {
  var res = await sb.from('teams').select('*').eq('id', ST.teamId).single();
  if (res.data) ST.notes = res.data.notes || '';
  ST.localStorageKey = 'em-notes-' + ST.teamId;
  var local = localStorage.getItem(ST.localStorageKey);
  if (local && local.length > ST.notes.length) ST.notes = local;
  ST.screen = 'notes';
  render();
}

function cleanupNotes() {
  if (ST.saveTimer) clearTimeout(ST.saveTimer);
  if (ST.realtimeSub) { ST.realtimeSub.unsubscribe(); ST.realtimeSub = null; }
  ST.teamId = null; ST.notes = ''; ST.localStorageKey = null;
}

// ================================================================
//  AUTO-SAVE
// ================================================================
function debounceSave() {
  ST.saveStatus = 'saving'; updateSaveIndicator();
  if (ST.saveTimer) clearTimeout(ST.saveTimer);
  ST.saveTimer = setTimeout(function() { saveNotes(); }, 2000);
}

async function saveNotes() {
  if (!ST.teamId) return;
  try {
    var res = await sb.from('teams').update({ notes: ST.notes, updated_at: new Date().toISOString() }).eq('id', ST.teamId);
    if (res.error) throw res.error;
    ST.saveStatus = 'saved';
    if (ST.localStorageKey) localStorage.removeItem(ST.localStorageKey);
  } catch (e) {
    console.error('Save failed:', e);
    ST.saveStatus = 'error';
    ST.saveTimer = setTimeout(function() { saveNotes(); }, 5000);
  }
  updateSaveIndicator();
}

function updateSaveIndicator() {
  var el = document.getElementById('save-indicator');
  if (!el) return;
  el.className = 'save-indicator ' + ST.saveStatus;
  el.textContent = ST.saveStatus === 'saved' ? 'All changes saved' :
                   ST.saveStatus === 'saving' ? 'Saving...' : 'Save failed — retrying...';
}

// ================================================================
//  DASHBOARD
// ================================================================
async function loadDashboardData() {
  var qRes = await sb.from('questions').select('*').order('sort_order');
  if (qRes.data) ST.questions = qRes.data;
  var tRes = await sb.from('teams').select('*').order('created_at');
  if (tRes.data) ST.allTeams = tRes.data;

  if (ST.realtimeSub) ST.realtimeSub.unsubscribe();
  ST.realtimeSub = sb.channel('dashboard-teams')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'teams' }, function(payload) {
      if (payload.eventType === 'INSERT') ST.allTeams.push(payload.new);
      else if (payload.eventType === 'UPDATE') {
        var idx = ST.allTeams.findIndex(function(t) { return t.id === payload.new.id; });
        if (idx >= 0) ST.allTeams[idx] = payload.new;
      } else if (payload.eventType === 'DELETE') {
        ST.allTeams = ST.allTeams.filter(function(t) { return t.id !== payload.old.id; });
      }
      render();
    })
    .subscribe();
}

// ================================================================
//  ZIP EXPORT
// ================================================================
async function downloadZip() {
  var zip = new JSZip();
  var root = zip.folder('Embodied-Minds-Notes');
  for (var wi = 0; wi < ST.workshops.length; wi++) {
    var w = ST.workshops[wi];
    var wFolder = root.folder(String(wi+1).padStart(2,'0') + '-' + w.title.replace(/[^a-zA-Z0-9 ]/g, '').replace(/ /g, '-'));
    var wQ = ST.questions.filter(function(q) { return q.workshop_id === w.id; });
    wQ.sort(function(a, b) { return a.sort_order - b.sort_order; });
    for (var qi = 0; qi < wQ.length; qi++) {
      var q = wQ[qi];
      var qFolder = wFolder.folder(String(qi+1).padStart(2,'0') + '-' + q.short_title);
      var qT = ST.allTeams.filter(function(t) { return t.question_id === q.id; });
      for (var ti = 0; ti < qT.length; ti++) {
        var t = qT[ti];
        qFolder.file(t.team_name.replace(/[^a-zA-Z0-9 ]/g,'').replace(/ /g,'-') + '.md',
          '# ' + q.text + '\n\n**Team:** ' + t.team_name + '\n**Workshop:** ' + w.title + '\n**Last updated:** ' + new Date(t.updated_at).toLocaleString() + '\n\n---\n\n' + (t.notes || '(no notes)'));
      }
    }
  }
  var blob = await zip.generateAsync({ type: 'blob' });
  var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'Embodied-Minds-Notes-' + new Date().toISOString().split('T')[0] + '.zip';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// ================================================================
//  EXCEL EXPORT
// ================================================================
function downloadExcel() {
  var rows = [];
  ST.workshops.forEach(function(w) {
    var wQ = ST.questions.filter(function(q) { return q.workshop_id === w.id; });
    wQ.sort(function(a, b) { return a.sort_order - b.sort_order; });
    wQ.forEach(function(q) {
      ST.allTeams.filter(function(t) { return t.question_id === q.id; }).forEach(function(t) {
        rows.push({ Workshop: w.title, Question: q.text, Team: t.team_name, Notes: t.notes || '', 'Last Updated': new Date(t.updated_at).toLocaleString() });
      });
    });
  });
  if (!rows.length) rows.push({ Workshop: '', Question: '', Team: '', Notes: 'No notes yet', 'Last Updated': '' });
  var ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{ wch: 40 }, { wch: 60 }, { wch: 15 }, { wch: 80 }, { wch: 20 }];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Workshop Notes');
  XLSX.writeFile(wb, 'Embodied-Minds-Notes-' + new Date().toISOString().split('T')[0] + '.xlsx');
}

//  WORD EXPORT
// ================================================================
async function downloadWord() {
  var D = docx, children = [];
  children.push(new D.Paragraph({ children: [new D.TextRun({ text: 'Embodied Minds Workshop Notes', bold: true, size: 48, font: 'Georgia' })], spacing: { after: 200 } }));
  children.push(new D.Paragraph({ children: [new D.TextRun({ text: 'Pre-Conference Salon · ' + new Date().toLocaleDateString(), size: 24, color: '666666' })], spacing: { after: 400 } }));
  ST.workshops.forEach(function(w) {
    children.push(new D.Paragraph({ children: [new D.TextRun({ text: w.title, bold: true, size: 36, font: 'Georgia' })], spacing: { before: 400, after: 200 }, heading: D.HeadingLevel.HEADING_1 }));
    var wQ = ST.questions.filter(function(q) { return q.workshop_id === w.id; });
    wQ.sort(function(a, b) { return a.sort_order - b.sort_order; });
    wQ.forEach(function(q, qi) {
      children.push(new D.Paragraph({ children: [new D.TextRun({ text: 'Question ' + (qi+1) + ': ' + q.text, bold: true, size: 28 })], spacing: { before: 300, after: 150 }, heading: D.HeadingLevel.HEADING_2 }));
      var qT = ST.allTeams.filter(function(t) { return t.question_id === q.id; });
      if (!qT.length) {
        children.push(new D.Paragraph({ children: [new D.TextRun({ text: 'No teams yet', italics: true, color: '999999', size: 22 })], spacing: { after: 100 } }));
      } else {
        qT.forEach(function(t) {
          children.push(new D.Paragraph({ children: [new D.TextRun({ text: t.team_name, bold: true, size: 24 })], spacing: { before: 200, after: 50 }, heading: D.HeadingLevel.HEADING_3 }));
          (t.notes || '(no notes)').split('\n').forEach(function(line) {
            children.push(new D.Paragraph({ children: [new D.TextRun({ text: line, size: 22 })], spacing: { after: 60 } }));
          });
        });
      }
    });
  });
  var doc = new D.Document({ sections: [{ properties: {}, children: children }] });
  var blob = await D.Packer.toBlob(doc);
  var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'Embodied-Minds-Notes-' + new Date().toISOString().split('T')[0] + '.docx';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// ================================================================
//  SYNTHESIS
// ================================================================
var SYNTH_URL = SB_URL + '/functions/v1/synthesize';

async function triggerSynthesis(workshopId) {
  ST.synthWorkshopId = workshopId;
  ST.synthLoading = true;
  ST.synthData = null;
  ST.synthWordFreqs = null;
  ST.synthSnapshots = [];
  ST.synthSnapshotIdx = -1;
  clearSynthTimers();
  render();
  try {
    var resp = await fetch(SYNTH_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY },
      body: JSON.stringify({ workshop_id: workshopId })
    });
    if (!resp.ok) throw new Error('Synthesis failed: ' + resp.status);
    var data = await resp.json();
    ST.synthData = data.synthesis || {};
    ST.synthWordFreqs = data.word_frequencies || [];
    ST.synthLoading = false;
    await loadSnapshots(workshopId);
    render();
    setTimeout(function() { renderWordCloud(ST.synthWordFreqs); }, 100);
  } catch (e) {
    console.error('Synthesis error:', e);
    ST.synthLoading = false;
    render();
  }
}

async function loadSnapshots(workshopId) {
  var res = await sb.from('workshop_snapshots').select('*').eq('workshop_id', workshopId).order('created_at');
  if (res.data) {
    ST.synthSnapshots = res.data;
    ST.synthSnapshotIdx = res.data.length > 0 ? res.data.length - 1 : -1;
  }
}

function clearSynthTimers() {
  if (ST.synthAutoPlayTimer) { clearInterval(ST.synthAutoPlayTimer); ST.synthAutoPlayTimer = null; }
  if (ST.synthAutoRefreshTimer) { clearInterval(ST.synthAutoRefreshTimer); ST.synthAutoRefreshTimer = null; }
  ST.synthAutoPlay = false;
  ST.synthAutoRefresh = false;
}

function toggleAutoPlay() {
  ST.synthAutoPlay = !ST.synthAutoPlay;
  if (ST.synthAutoPlayTimer) { clearInterval(ST.synthAutoPlayTimer); ST.synthAutoPlayTimer = null; }
  if (ST.synthAutoPlay && ST.synthSnapshots.length > 1) {
    ST.synthAutoPlayTimer = setInterval(function() {
      ST.synthSnapshotIdx = (ST.synthSnapshotIdx + 1) % ST.synthSnapshots.length;
      applySnapshot(ST.synthSnapshotIdx);
    }, 2000);
  }
  updateAutoPlayBtn();
}

function toggleAutoRefresh() {
  ST.synthAutoRefresh = !ST.synthAutoRefresh;
  if (ST.synthAutoRefreshTimer) { clearInterval(ST.synthAutoRefreshTimer); ST.synthAutoRefreshTimer = null; }
  if (ST.synthAutoRefresh && ST.synthWorkshopId) {
    ST.synthAutoRefreshTimer = setInterval(function() {
      triggerSynthesis(ST.synthWorkshopId);
    }, 60000);
  }
  updateAutoRefreshBtn();
}

function updateAutoPlayBtn() {
  var btn = document.getElementById('synth-autoplay-btn');
  if (btn) {
    btn.textContent = ST.synthAutoPlay ? 'Pause' : 'Auto-Play';
    btn.className = 'synth-btn' + (ST.synthAutoPlay ? ' active' : '');
  }
}

function updateAutoRefreshBtn() {
  var btn = document.getElementById('synth-autorefresh-btn');
  if (btn) {
    btn.textContent = ST.synthAutoRefresh ? 'Live: ON' : 'Live: OFF';
    btn.className = 'synth-btn' + (ST.synthAutoRefresh ? ' active' : '');
  }
}

function applySnapshot(idx) {
  if (idx < 0 || idx >= ST.synthSnapshots.length) return;
  var snap = ST.synthSnapshots[idx];
  ST.synthSnapshotIdx = idx;
  ST.synthData = snap.synthesis || {};
  ST.synthWordFreqs = snap.word_frequencies || [];
  // Update the slider and timestamp display
  var slider = document.getElementById('synth-slider');
  if (slider) slider.value = idx;
  var tsEl = document.getElementById('synth-timestamp');
  if (tsEl) tsEl.textContent = new Date(snap.created_at).toLocaleString();
  // Update analysis cards in place
  updateAnalysisCards();
  // Animate word cloud
  renderWordCloud(ST.synthWordFreqs);
}

function updateAnalysisCards() {
  var gapsEl = document.getElementById('synth-gaps-list');
  var oppsEl = document.getElementById('synth-opps-list');
  var themesEl = document.getElementById('synth-themes-grid');
  if (gapsEl && ST.synthData.gaps) {
    gapsEl.innerHTML = ST.synthData.gaps.map(function(g) { return '<li>' + esc(g) + '</li>'; }).join('');
  }
  if (oppsEl && ST.synthData.opportunities) {
    oppsEl.innerHTML = ST.synthData.opportunities.map(function(o) { return '<li>' + esc(o) + '</li>'; }).join('');
  }
  if (themesEl && ST.synthData.themes) {
    themesEl.innerHTML = ST.synthData.themes.map(function(t) {
      return '<div class="synth-theme-card">'
        + '<div class="synth-theme-name">' + esc(t.name || t.theme || '') + '</div>'
        + '<div class="synth-theme-desc">' + esc(t.description || '') + '</div>'
        + '<div class="synth-theme-count">' + (t.mention_count || t.mentions || 0) + ' mentions</div>'
        + '</div>';
    }).join('');
  }
}

function renderWordCloud(freqs) {
  var container = document.getElementById('synth-wordcloud');
  if (!container || !freqs || !freqs.length) return;
  var w = Math.min(container.clientWidth, 700);
  var h = 350;

  var maxCount = d3.max(freqs, function(d) { return d.count; }) || 1;
  var sizeScale = d3.scaleSqrt().domain([1, maxCount]).range([12, 56]);

  var palette = ['#9B8EC4', '#D4A94E', '#B8A8D8', '#C49A42', '#7B6EA4', '#E8C870', '#A097C0', '#D4B67E'];

  var words = freqs.slice(0, 80).map(function(d) {
    return { text: d.word, size: sizeScale(d.count), count: d.count };
  });

  // Clear previous
  d3.select(container).selectAll('svg').remove();

  var svg = d3.select(container).append('svg')
    .attr('width', w).attr('height', h)
    .append('g')
    .attr('transform', 'translate(' + w / 2 + ',' + h / 2 + ')');

  d3.layout.cloud()
    .size([w, h])
    .words(words)
    .padding(4)
    .rotate(function() { return (~~(Math.random() * 3) - 1) * 30; })
    .font('Sora')
    .fontSize(function(d) { return d.size; })
    .on('end', function(drawn) {
      var texts = svg.selectAll('text').data(drawn, function(d) { return d.text; });
      texts.enter().append('text')
        .style('font-size', '1px')
        .style('fill', function(d, i) { return palette[i % palette.length]; })
        .attr('text-anchor', 'middle')
        .attr('font-family', 'Sora, sans-serif')
        .attr('font-weight', function(d) { return d.size > 30 ? '600' : '400'; })
        .attr('transform', function(d) { return 'translate(' + [d.x, d.y] + ')rotate(' + d.rotate + ')'; })
        .text(function(d) { return d.text; })
        .transition().duration(600)
        .style('font-size', function(d) { return d.size + 'px'; })
        .style('opacity', 1);
    })
    .start();
}

function renderSynthSection() {
  var tabs = ST.workshops.map(function(w) {
    var isActive = ST.synthWorkshopId === w.id;
    var shortTitle = w.title.replace(/^Workshop [IVX]+ — /, '');
    return '<button class="synth-tab' + (isActive ? ' active' : '') + '" data-action="synth-tab" data-wid="' + esc(w.id) + '">'
      + esc(shortTitle) + '</button>';
  }).join('');

  var content = '';
  if (ST.synthLoading) {
    content = '<div class="synth-loading"><div class="synth-loading-spinner"></div><div class="synth-loading-text">Claude is analyzing workshop notes...</div></div>';
  } else if (ST.synthData) {
    // Gaps & Opportunities
    var gaps = (ST.synthData.gaps || []).map(function(g) { return '<li>' + esc(g) + '</li>'; }).join('');
    var opps = (ST.synthData.opportunities || []).map(function(o) { return '<li>' + esc(o) + '</li>'; }).join('');
    var panel = '<div class="synth-panel">'
      + '<div class="synth-card"><div class="synth-card-title">Knowledge Gaps</div><ul id="synth-gaps-list">' + (gaps || '<li style="color:var(--lunar-40)">No gaps identified</li>') + '</ul></div>'
      + '<div class="synth-card"><div class="synth-card-title">Opportunities</div><ul id="synth-opps-list">' + (opps || '<li style="color:var(--lunar-40)">No opportunities identified</li>') + '</ul></div>'
      + '</div>';

    // Themes
    var themes = (ST.synthData.themes || []).map(function(t) {
      return '<div class="synth-theme-card">'
        + '<div class="synth-theme-name">' + esc(t.name || t.theme || '') + '</div>'
        + '<div class="synth-theme-desc">' + esc(t.description || '') + '</div>'
        + '<div class="synth-theme-count">' + (t.mention_count || t.mentions || 0) + ' mentions</div>'
        + '</div>';
    }).join('');
    var themesSection = '<div class="synth-card" style="margin-bottom:24px"><div class="synth-card-title">Themes</div>'
      + '<div class="synth-themes" id="synth-themes-grid">' + (themes || '<div style="font-size:13px;color:var(--lunar-40)">No themes identified</div>') + '</div></div>';

    // Word cloud
    var wordcloud = '<div class="synth-wordcloud-wrap"><div id="synth-wordcloud"></div></div>';

    // Timeline
    var timeline = '';
    if (ST.synthSnapshots.length > 0) {
      var currentSnap = ST.synthSnapshots[ST.synthSnapshotIdx] || ST.synthSnapshots[ST.synthSnapshots.length - 1];
      var tsLabel = currentSnap ? new Date(currentSnap.created_at).toLocaleString() : '';
      timeline = '<div class="synth-timeline">'
        + '<button class="synth-btn' + (ST.synthAutoPlay ? ' active' : '') + '" id="synth-autoplay-btn">' + (ST.synthAutoPlay ? 'Pause' : 'Auto-Play') + '</button>'
        + '<input type="range" id="synth-slider" min="0" max="' + (ST.synthSnapshots.length - 1) + '" value="' + ST.synthSnapshotIdx + '" />'
        + '<span class="synth-timeline-ts" id="synth-timestamp">' + esc(tsLabel) + '</span>'
        + '</div>';
    }

    // Controls
    var controls = '<div class="synth-controls">'
      + '<button class="synth-btn" data-action="synth-refresh">Refresh Now</button>'
      + '<button class="synth-btn' + (ST.synthAutoRefresh ? ' active' : '') + '" id="synth-autorefresh-btn">' + (ST.synthAutoRefresh ? 'Live: ON' : 'Live: OFF') + '</button>'
      + '</div>';

    content = panel + themesSection + wordcloud + timeline + controls;
  } else if (ST.synthWorkshopId === null) {
    content = '<div style="text-align:center;padding:32px 0;font-size:13px;color:var(--lunar-40)">Select a workshop above to generate AI synthesis</div>';
  }

  return '<div class="synth-section">'
    + '<div class="page-header" style="margin-bottom:24px"><div class="lbl">AI Synthesis</div><h1 style="font-size:28px">Cross-Team Analysis</h1></div>'
    + '<div class="synth-tabs">' + tabs + '</div>'
    + content
    + '</div>';
}

function attachSynthListeners() {
  document.querySelectorAll('[data-action="synth-tab"]').forEach(function(el) {
    el.addEventListener('click', function() { triggerSynthesis(el.dataset.wid); });
  });
  var slider = document.getElementById('synth-slider');
  if (slider) {
    slider.addEventListener('input', function() {
      if (ST.synthAutoPlay) toggleAutoPlay(); // pause auto-play on manual slide
      applySnapshot(parseInt(slider.value));
    });
  }
  var apBtn = document.getElementById('synth-autoplay-btn');
  if (apBtn) apBtn.addEventListener('click', toggleAutoPlay);
  var arBtn = document.getElementById('synth-autorefresh-btn');
  if (arBtn) arBtn.addEventListener('click', toggleAutoRefresh);
  document.querySelectorAll('[data-action="synth-refresh"]').forEach(function(el) {
    el.addEventListener('click', function() { if (ST.synthWorkshopId) triggerSynthesis(ST.synthWorkshopId); });
  });
}

// ================================================================
//  INIT
// ================================================================
(async function() {
  await loadWorkshops();
  render();
})();
  </script>
